<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NVR — Login</title>
<link rel="stylesheet" href="/shared.css">
</head>
<body>
<div id="login" class="login-wrap">
  <form class="login-box" id="loginForm">
    <h1>NVR Login</h1>
    <div id="loginError" class="login-error" style="display:none"></div>
    <input type="text" id="loginUser" placeholder="Username" autocomplete="username" required>
    <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password" required>
    <button type="submit">Sign In</button>
  </form>
</div>
<script>
// If already authenticated, go straight to monitor
(async function() {
  var t = localStorage.getItem('nvr_token');
  if (!t) return;
  try {
    var r = await fetch('/api/cameras', { headers: { 'Authorization': 'Bearer ' + t } });
    if (r.ok) { window.location.href = '/monitor.html'; return; }
  } catch(_) {}
  localStorage.removeItem('nvr_token');
})();

document.getElementById('loginForm').onsubmit = async function(e) {
  e.preventDefault();
  var errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  try {
    var resp = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('loginUser').value,
        password: document.getElementById('loginPass').value
      })
    });
    if (!resp.ok) throw new Error((await resp.text()).trim() || 'Login failed');
    var data = await resp.json();
    localStorage.setItem('nvr_token', data.token);
    window.location.href = '/monitor.html';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  }
};
</script>
</body>
</html>
