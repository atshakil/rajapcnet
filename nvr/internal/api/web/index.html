<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NVR</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a;
  --text: #e0e0e0; --muted: #888; --accent: #4a9eff; --danger: #ff4a4a;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Login */
.login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 2rem; width: 320px; }
.login-box h1 { font-size: 1.25rem; margin-bottom: 1.5rem; text-align: center; }
.login-box input { display: block; width: 100%; padding: 0.6rem 0.8rem; margin-bottom: 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.9rem; }
.login-box input:focus { outline: none; border-color: var(--accent); }
.login-box button { display: block; width: 100%; padding: 0.6rem; background: var(--accent); color: #fff; border: none; border-radius: 4px; font-size: 0.9rem; cursor: pointer; }
.login-box button:hover { opacity: 0.9; }
.login-error { color: var(--danger); font-size: 0.8rem; margin-bottom: 0.5rem; text-align: center; }

/* App shell */
.app { display: none; flex-direction: column; height: 100vh; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 1rem; background: var(--surface); border-bottom: 1px solid var(--border); }
.topbar h1 { font-size: 1rem; font-weight: 600; }
.topbar-actions { display: flex; gap: 0.5rem; align-items: center; }
.topbar-actions button { background: none; border: 1px solid var(--border); color: var(--text); padding: 0.3rem 0.6rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
.topbar-actions button:hover { border-color: var(--accent); }
.topbar-actions button.active { border-color: var(--accent); background: rgba(74,158,255,0.1); }
.user-badge { font-size: 0.8rem; color: var(--muted); }
.btn-logout { color: var(--danger) !important; border-color: var(--danger) !important; }

/* Video grid */
.grid-wrap { flex: 1; padding: 0.5rem; overflow: auto; }
.video-grid { display: grid; gap: 4px; height: 100%; }
.grid-2x2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.grid-1x1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
.cam-cell { background: #000; border: 1px solid var(--border); border-radius: 4px; position: relative; overflow: hidden; cursor: pointer; }
.cam-cell:hover { border-color: var(--accent); }
.cam-label { position: absolute; top: 6px; left: 8px; font-size: 0.75rem; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 3px; z-index: 2; pointer-events: none; }
.cam-status { position: absolute; top: 8px; right: 10px; width: 8px; height: 8px; border-radius: 50%; z-index: 2; pointer-events: none; }
.cam-status.online { background: #4caf50; }
.cam-status.offline { background: var(--danger); }
.cam-placeholder { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: var(--muted); font-size: 0.85rem; z-index: 1; text-align: center; pointer-events: none; }
.cam-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 0; }
.cam-bottom { position: absolute; bottom: 0; left: 0; right: 0; display: flex; align-items: flex-end; justify-content: space-between; padding: 6px 8px; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.8)); z-index: 2; }
.cam-caps { display: flex; gap: 4px; flex-wrap: wrap; }
.cam-cap { font-size: 0.6rem; background: rgba(74,158,255,0.2); color: var(--accent); padding: 1px 4px; border-radius: 2px; }
.cam-modes { display: flex; gap: 2px; }
.mode-btn { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.65); padding: 1px 6px; border-radius: 3px; font-size: 0.65rem; cursor: pointer; }
.mode-btn:hover { border-color: rgba(255,255,255,0.5); color: #fff; }
.mode-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
/* Codec mismatch overlay */
.codec-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.88); z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 16px; text-align: center; }
.codec-title { color: #ffa726; font-size: 0.85rem; font-weight: 600; }
.codec-sub { color: var(--muted); font-size: 0.72rem; line-height: 1.4; max-width: 90%; }
.codec-fix-btn { background: var(--accent); border: none; color: #fff; padding: 0.4rem 1.1rem; border-radius: 4px; font-size: 0.8rem; cursor: pointer; margin-top: 4px; }
.codec-fix-btn:hover { opacity: 0.88; }
.codec-fix-btn:disabled { opacity: 0.5; cursor: default; }
.codec-cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0.25rem 0.8rem; border-radius: 4px; font-size: 0.72rem; cursor: pointer; }

/* No cameras */
.no-cameras { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login" class="login-wrap">
  <form class="login-box" id="loginForm">
    <h1>NVR Login</h1>
    <div id="loginError" class="login-error" style="display:none"></div>
    <input type="text" id="loginUser" placeholder="Username" autocomplete="username" required>
    <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password" required>
    <button type="submit">Sign In</button>
  </form>
</div>

<!-- App -->
<div id="app" class="app">
  <div class="topbar">
    <h1>NVR</h1>
    <div class="topbar-actions">
      <button id="btnGrid" class="active" title="2x2 Grid">Grid</button>
      <button id="btnFull" title="Fullscreen single camera">Full</button>
      <span class="user-badge" id="userBadge"></span>
      <button class="btn-logout" id="btnLogout">Logout</button>
    </div>
  </div>
  <div class="grid-wrap">
    <div id="videoGrid" class="video-grid grid-2x2"></div>
  </div>
</div>

<script>
const API = '';
let token = localStorage.getItem('nvr_token');
let user = null;
let cameras = [];
let camPrefs = {}; // {cameraId: "snapshot"|"primary"|"sub"}
let gridMode = '2x2';
let selectedCam = null;

// ---------------------------------------------------------------------------
// API helpers

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...opts.headers };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const resp = await fetch(API + path, { ...opts, headers });
  if (resp.status === 401) { logout(); throw new Error('unauthorized'); }
  return resp;
}

async function login(username, password) {
  const resp = await fetch(API + '/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });
  if (!resp.ok) {
    const text = await resp.text();
    throw new Error(text.trim() || 'Login failed');
  }
  const data = await resp.json();
  token = data.token;
  user = data.user;
  localStorage.setItem('nvr_token', token);
  await showApp();
}

function logout() {
  token = null;
  user = null;
  localStorage.removeItem('nvr_token');
  document.getElementById('login').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ---------------------------------------------------------------------------
// Data loading

async function loadCameras() {
  try {
    const resp = await api('/api/cameras');
    cameras = await resp.json();
  } catch (e) {
    console.error('Failed to load cameras:', e);
  }
}

async function loadPrefs() {
  try {
    const resp = await api('/api/prefs');
    const data = await resp.json();
    camPrefs = {};
    for (const [k, v] of Object.entries(data.cameras || {})) {
      camPrefs[parseInt(k)] = v;
    }
  } catch (e) {}
}

// ---------------------------------------------------------------------------
// App shell

async function showApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('userBadge').textContent = user ? user.username + ' (' + user.role + ')' : '';
  await Promise.all([loadCameras(), loadPrefs()]);
  renderGrid();
}

// ---------------------------------------------------------------------------
// Grid

function renderGrid() {
  const grid = document.getElementById('videoGrid');
  Array.from(grid.children).forEach(cell => { if (cell._cleanup) cell._cleanup(); });
  grid.innerHTML = '';

  if (cameras.length === 0) {
    grid.className = 'video-grid grid-1x1';
    grid.innerHTML = '<div class="no-cameras">No cameras configured. Use nvrctl to add cameras.</div>';
    return;
  }

  if (gridMode === '1x1' && selectedCam !== null) {
    grid.className = 'video-grid grid-1x1';
    const cam = cameras.find(c => c.id === selectedCam) || cameras[0];
    grid.appendChild(createCamCell(cam));
  } else {
    grid.className = 'video-grid grid-2x2';
    cameras.slice(0, 4).forEach(cam => grid.appendChild(createCamCell(cam)));
  }
}

// ---------------------------------------------------------------------------
// Camera cell

function createCamCell(cam) {
  const cell = document.createElement('div');
  cell.className = 'cam-cell';
  cell.onclick = () => {
    if (gridMode === '2x2') { selectedCam = cam.id; setGrid('1x1'); }
    else { setGrid('2x2'); }
  };

  // Parse available streams
  let streamURIs = [];
  try { streamURIs = JSON.parse(cam.stream_uris || '[]'); } catch (e) {}

  // Determine initial mode
  let mode = camPrefs[cam.id] || 'snapshot';
  // Fall back to snapshot if preferred mode requires unavailable streams
  if (mode === 'primary' && streamURIs.length < 1) mode = 'snapshot';
  if (mode === 'sub' && streamURIs.length < 2) mode = 'snapshot';

  // -- Label / status overlays --
  const label = document.createElement('span');
  label.className = 'cam-label';
  label.textContent = cam.name;
  cell.appendChild(label);

  const statusDot = document.createElement('span');
  statusDot.className = 'cam-status ' + (cam.enabled ? 'online' : 'offline');
  cell.appendChild(statusDot);

  // -- Placeholder (visible when no stream is playing) --
  const ph = document.createElement('span');
  ph.className = 'cam-placeholder';
  ph.textContent = [cam.manufacturer, cam.model].filter(Boolean).join(' ') || cam.ip;
  cell.appendChild(ph);

  // -- Media elements --
  const img = document.createElement('img');
  img.className = 'cam-video';
  cell.appendChild(img);

  const video = document.createElement('video');
  video.className = 'cam-video';
  video.autoplay = true;
  video.muted = true;
  video.playsInline = true;
  cell.appendChild(video);

  // -- Bottom bar: caps + mode selector --
  const bottom = document.createElement('div');
  bottom.className = 'cam-bottom';

  const caps = document.createElement('div');
  caps.className = 'cam-caps';
  if (cam.has_onvif) addCap(caps, 'ONVIF');
  if (cam.has_ptz) addCap(caps, 'PTZ');
  if (cam.has_motion) addCap(caps, 'Motion');
  if (cam.has_infrared) addCap(caps, 'IR');
  if (cam.has_floodlight) addCap(caps, 'Light');
  bottom.appendChild(caps);

  const availModes = [
    { key: 'snapshot', label: 'Snap' },
    ...(streamURIs.length >= 1 ? [{ key: 'primary', label: 'Primary' }] : []),
    ...(streamURIs.length >= 2 ? [{ key: 'sub', label: 'Sub' }] : []),
  ];

  const modeBar = document.createElement('div');
  modeBar.className = 'cam-modes';
  const modeBtns = {};
  availModes.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'mode-btn' + (m.key === mode ? ' active' : '');
    btn.textContent = m.label;
    btn.onclick = async e => {
      e.stopPropagation();
      if (m.key === mode) return;
      mode = m.key;
      camPrefs[cam.id] = m.key;
      Object.values(modeBtns).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      try { await api(`/api/cameras/${cam.id}/pref`, { method: 'PUT', body: JSON.stringify({ stream_mode: m.key }) }); } catch (_) {}
      applyMode();
    };
    modeBtns[m.key] = btn;
    modeBar.appendChild(btn);
  });
  bottom.appendChild(modeBar);
  cell.appendChild(bottom);

  // -- Media management --
  let snapTimer = null;
  let pc = null;

  function showMedia(el) {
    [img, video].forEach(e => { e.style.display = 'none'; });
    el.style.display = 'block';
    ph.style.display = 'none';
  }

  function stopAll() {
    if (snapTimer) { clearInterval(snapTimer); snapTimer = null; }
    if (img.src && img.src.startsWith('blob:')) URL.revokeObjectURL(img.src);
    img.src = '';
    img.style.display = 'none';
    if (pc) { pc.close(); pc = null; }
    video.srcObject = null;
    video.style.display = 'none';
    ph.style.display = '';
    const overlay = cell.querySelector('.codec-overlay');
    if (overlay) overlay.remove();
  }

  async function startSnapshot() {
    async function refresh() {
      try {
        const resp = await fetch(`/api/cameras/${cam.id}/snapshot`, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!resp.ok) return;
        const blob = await resp.blob();
        const newSrc = URL.createObjectURL(blob);
        const old = img.src;
        img.src = newSrc;
        showMedia(img);
        if (old && old.startsWith('blob:')) URL.revokeObjectURL(old);
      } catch (_) {}
    }
    await refresh();
    snapTimer = setInterval(refresh, 2000);
  }

  async function startWebRTC(streamKey) {
    try {
      pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
      pc.addTransceiver('video', { direction: 'recvonly' });
      pc.addTransceiver('audio', { direction: 'recvonly' });
      pc.ontrack = evt => {
        if (evt.track.kind === 'video') {
          video.srcObject = evt.streams[0];
          showMedia(video);
        }
      };

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      // Wait for ICE gathering to finish (or timeout after 3 s)
      await new Promise(resolve => {
        if (pc.iceGatheringState === 'complete') { resolve(); return; }
        const done = () => { if (pc.iceGatheringState === 'complete') { pc.removeEventListener('icegatheringstatechange', done); resolve(); } };
        pc.addEventListener('icegatheringstatechange', done);
        setTimeout(resolve, 3000);
      });

      const resp = await fetch(`/api/cameras/${cam.id}/webrtc?stream=${streamKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/sdp', 'Authorization': 'Bearer ' + token },
        body: pc.localDescription.sdp
      });

      // Codec mismatch: show Fix overlay instead of silently reverting to Snap
      if (resp.status === 409) {
        if (pc) { pc.close(); pc = null; }
        const data = await resp.json().catch(() => ({}));
        if (data.error === 'codec_mismatch') {
          showCodecOverlay(data.camera_codec || 'H265', streamKey);
          return;
        }
      }

      if (!resp.ok) throw new Error('signaling ' + resp.status);
      const answerSdp = await resp.text();
      await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
    } catch (err) {
      console.warn('WebRTC failed for cam', cam.id, ':', err.message, '— falling back to snapshot');
      if (pc) { pc.close(); pc = null; }
      // Revert mode button to Snap
      mode = 'snapshot';
      camPrefs[cam.id] = 'snapshot';
      Object.values(modeBtns).forEach(b => b.classList.remove('active'));
      if (modeBtns['snapshot']) modeBtns['snapshot'].classList.add('active');
      startSnapshot();
    }
  }

  function showCodecOverlay(codec, streamKey) {
    // Remove any existing overlay first
    const existing = cell.querySelector('.codec-overlay');
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.className = 'codec-overlay';

    const title = document.createElement('div');
    title.className = 'codec-title';
    title.textContent = `⚠ Camera uses ${codec}`;
    overlay.appendChild(title);

    const sub = document.createElement('div');
    sub.className = 'codec-sub';
    sub.textContent = 'Most browsers only support H.264 for WebRTC. Click below to switch the camera encoder to H.264 via ONVIF (no transcoding, one-time change).';
    overlay.appendChild(sub);

    const fixBtn = document.createElement('button');
    fixBtn.className = 'codec-fix-btn';
    fixBtn.textContent = 'Fix: Switch Camera to H.264';
    overlay.appendChild(fixBtn);

    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'codec-cancel';
    cancelBtn.textContent = 'Keep Snapshot';
    overlay.appendChild(cancelBtn);

    fixBtn.onclick = async e => {
      e.stopPropagation();
      fixBtn.disabled = true;
      fixBtn.textContent = 'Switching to H.264\u2026';
      try {
        const r = await fetch(`/api/cameras/${cam.id}/set-h264`, {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.message || r.status);
        overlay.remove();
        fixBtn.textContent = 'Done! Reconnecting\u2026';
        // Allow camera encoder to settle, then retry WebRTC
        await new Promise(res => setTimeout(res, 2000));
        await startWebRTC(streamKey);
      } catch (err) {
        fixBtn.disabled = false;
        fixBtn.textContent = 'Failed: ' + err.message;
      }
    };

    cancelBtn.onclick = e => {
      e.stopPropagation();
      overlay.remove();
      mode = 'snapshot';
      camPrefs[cam.id] = 'snapshot';
      Object.values(modeBtns).forEach(b => b.classList.remove('active'));
      if (modeBtns['snapshot']) modeBtns['snapshot'].classList.add('active');
      startSnapshot();
    };

    cell.appendChild(overlay);
  }

  function applyMode() {
    stopAll();
    if (mode === 'snapshot') startSnapshot();
    else if (mode === 'primary') startWebRTC('primary');
    else if (mode === 'sub') startWebRTC('sub');
  }

  cell._cleanup = stopAll;
  applyMode();

  return cell;
}

function addCap(parent, text) {
  const el = document.createElement('span');
  el.className = 'cam-cap';
  el.textContent = text;
  parent.appendChild(el);
}

function setGrid(mode) {
  gridMode = mode;
  document.getElementById('btnGrid').classList.toggle('active', mode === '2x2');
  document.getElementById('btnFull').classList.toggle('active', mode === '1x1');
  renderGrid();
}

// ---------------------------------------------------------------------------
// Init

document.getElementById('loginForm').onsubmit = async e => {
  e.preventDefault();
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  try {
    await login(document.getElementById('loginUser').value, document.getElementById('loginPass').value);
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  }
};

document.getElementById('btnGrid').onclick = () => setGrid('2x2');
document.getElementById('btnFull').onclick = () => {
  if (cameras.length > 0) { selectedCam = selectedCam || cameras[0].id; setGrid('1x1'); }
};
document.getElementById('btnLogout').onclick = logout;

// Re-validate existing token and restore session without showing login flash
(async () => {
  if (!token) return;
  try {
    const [camResp] = await Promise.all([api('/api/cameras'), loadPrefs()]);
    if (camResp.ok) {
      cameras = await camResp.json();
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      renderGrid();
      return;
    }
  } catch (_) {}
  logout();
})();
</script>
</body>
</html>
